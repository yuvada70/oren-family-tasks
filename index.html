<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משימות משפחת אורן</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-blue-600 mb-6 text-center">Oren Family Tasks 🏠</h1>
        
        <div class="space-y-4">
            <div class="flex justify-between items-center p-4 bg-blue-50 rounded-lg">
                <div>
                    <p class="font-bold text-gray-800 text-lg">להוציא את לוסי 🐶</p>
                    <p class="text-sm text-blue-500 font-medium text-right">באחריות: יולי</p>
                </div>
                <button onclick="alert('נדנוד נשלח ליולי! 🔔')" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-full font-bold shadow-sm transition-transform active:scale-95">נדנוד!</button>
            </div>

            <div class="flex justify-between items-center p-4 bg-blue-50 rounded-lg">
                <div>
                    <p class="font-bold text-gray-800 text-lg">לרוקן מדיח 🍽️</p>
                    <p class="text-sm text-blue-500 font-medium text-right">באחריות: רומי</p>
                </div>
                <button onclick="alert('נדנוד נשלח לרומי! 🔔')" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-full font-bold shadow-sm transition-transform active:scale-95">נדנוד!</button>
            </div>
        </div>
        
        <p class="text-center text-gray-400 text-xs mt-8 italic text-right">האפליקציה של משפחת אורן - תמיד באוויר</p>
    </div>
</body>
</html>
